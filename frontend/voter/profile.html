<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile — Chennai Elections 2026</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="grid-bg"></div>
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">🗳️ Chennai Elections<span>2026 Legislative Assembly</span></div>
            </div>
            <nav class="sidebar-nav">
                <a href="home.html" class="nav-item"><span class="icon">🗺️</span> Constituency Map</a>
                <a href="evoter.html" class="nav-item"><span class="icon">🪪</span> E-Voter Card</a>
                <a href="profile.html" class="nav-item active"><span class="icon">👤</span> My Profile</a>
            </nav>
            <div class="sidebar-footer">
                <div class="voter-chip">
                    <div class="voter-chip-avatar" id="avatar">👤</div>
                    <div class="voter-chip-info">
                        <div class="voter-chip-name" id="voter-name">Loading...</div>
                        <div class="voter-chip-id" id="voter-id-chip">—</div>
                    </div>
                </div>
                <button class="btn-logout" onclick="logout()">↗ Sign Out</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h1 class="page-title">👤 My Profile</h1>
                <p class="page-subtitle">Your voter registration details</p>
            </div>

            <div style="max-width:600px;">
                <div class="glass-card" style="padding:32px;">
                    <div class="flex items-center gap-4 mb-4"
                        style="padding-bottom:20px; border-bottom:1px solid var(--border);">
                        <div style="width:60px; height:60px; border-radius:50%; background:linear-gradient(135deg, var(--accent), var(--accent2));
                        display:flex; align-items:center; justify-content:center; font-size:1.5rem;"
                            id="profile-avatar">👤</div>
                        <div>
                            <h2 style="font-size:1.2rem; font-weight:700;" id="profile-name">—</h2>
                            <p class="mono text-xs text-muted" id="profile-voter-id">—</p>
                        </div>
                        <div style="margin-left:auto;" id="vote-status"></div>
                    </div>

                    <div style="display:grid; gap:16px;">
                        <div class="flex justify-between"><span class="text-muted text-sm">Date of Birth</span><span
                                class="text-sm" id="p-dob">—</span></div>
                        <div class="flex justify-between"><span class="text-muted text-sm">Age</span><span
                                class="text-sm" id="p-age">—</span></div>
                        <div class="flex justify-between"><span class="text-muted text-sm">Gender</span><span
                                class="text-sm" id="p-gender">—</span></div>
                        <div class="flex justify-between"><span class="text-muted text-sm">Constituency</span><span
                                class="text-sm" id="p-const">—</span></div>
                        <div class="flex justify-between"><span class="text-muted text-sm">Constituency Type</span><span
                                id="p-type">—</span></div>
                        <div class="flex justify-between"><span class="text-muted text-sm">Polling Booth</span><span
                                class="text-sm" id="p-booth">—</span></div>
                        <div class="flex justify-between"><span class="text-muted text-sm">Serial No.</span><span
                                class="mono text-sm" id="p-serial">—</span></div>
                        <div style="padding-top:12px; border-top:1px solid var(--border);">
                            <span class="text-muted text-sm">Address</span>
                            <p class="text-sm mt-2" id="p-address">—</p>
                        </div>
                        <div>
                            <span class="text-muted text-sm">Booth Address</span>
                            <p class="text-sm mt-2" id="p-booth-addr">—</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/api.js"></script>
    <script>
        async function init() {
            const voter = await requireVoterAuth();
            if (!voter) return;

            const isF = voter.gender === 'Female';
            document.getElementById('voter-name').textContent = voter.name;
            document.getElementById('voter-id-chip').textContent = voter.voter_id;
            document.getElementById('avatar').textContent = isF ? '👩' : '👨';
            document.getElementById('profile-avatar').textContent = isF ? '👩' : '👨';
            document.getElementById('profile-name').textContent = voter.name;
            document.getElementById('profile-voter-id').textContent = voter.voter_id;
            document.getElementById('p-dob').textContent = voter.dob;
            document.getElementById('p-age').textContent = voter.age;
            document.getElementById('p-gender').textContent = voter.gender;
            document.getElementById('p-const').textContent = voter.constituency_name;
            document.getElementById('p-booth').textContent = voter.booth_name;
            document.getElementById('p-serial').textContent = voter.serial_no;
            document.getElementById('p-address').textContent = voter.address;
            document.getElementById('p-booth-addr').textContent = voter.booth_address;

            document.getElementById('p-type').innerHTML = voter.constituency_type === 'SC'
                ? '<span class="badge badge-sc">SC</span>'
                : '<span class="badge badge-general">General</span>';

            document.getElementById('vote-status').innerHTML = voter.has_voted
                ? '<span class="badge badge-voted">✓ Voted</span>'
                : '<span class="badge badge-not-voted">Not Voted</span>';
        }
        init();
    </script>
</body>

</html>
