<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Election Results — Administrative Portal</title>
    <meta name="description" content="Election results — Chennai District Elections 2026">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <div class="logo-emblem">
                        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                        </svg>
                    </div>
                    <div class="logo-text">
                        Administrative Portal
                        <span>Election Commission of India</span>
                    </div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></span>
                    Dashboard
                </a>
                <a href="voters.html" class="nav-item">
                    <span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg></span>
                    Voter List
                </a>
                <a href="candidates.html" class="nav-item">
                    <span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21h18"/><path d="M5 21V7l8-4v18"/><path d="M19 21V11l-6-4"/></svg></span>
                    Candidates
                </a>
                <a href="polling.html" class="nav-item">
                    <span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg></span>
                    Polling Mode
                </a>
                <a href="results.html" class="nav-item active">
                    <span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span>
                    Results
                </a>
            </nav>
            <div class="sidebar-footer">
                <button class="btn-logout" onclick="logout()">Sign Out</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h1 class="page-title">Election Results</h1>
                <p class="page-subtitle">Leading candidates per constituency</p>
            </div>

            <div class="results-grid" id="results-grid">
                <div style="grid-column:span 2; text-align:center; padding:40px;">
                    <div class="spinner"></div>
                    <p style="color:var(--text-secondary); font-size:var(--text-sm); margin-top:12px;">Loading results...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Result Detail Modal -->
    <div class="modal-overlay hidden" id="result-modal">
        <div class="modal" style="max-width:600px;">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-const-name">—</h3>
                <button class="modal-close" onclick="closeResultModal()">&times;</button>
            </div>
            <div id="modal-results"></div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script>
        async function init() {
            const data = await requireAdminAuth();
            if (!data) return;

            const res = await api('GET', '/api/admin/results');
            if (!res || !res.success) return;

            const grid = document.getElementById('results-grid');

            if (res.results.length === 0) {
                grid.innerHTML = `
          <div style="grid-column:span 2; text-align:center; padding:60px;">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#003580" stroke-width="1.5" style="margin-bottom:16px; opacity:0.4;">
              <polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
            </svg>
            <h3 style="font-family:'Noto Serif',serif; font-size:var(--text-lg); font-weight:600; color:var(--navy); margin-bottom:8px;">No Votes Recorded Yet</h3>
            <p style="color:var(--text-secondary); font-size:var(--text-sm);">Results will appear here once votes are recorded through Polling Mode</p>
          </div>
        `;
                return;
            }

            grid.innerHTML = res.results.map(r => `
        <div class="result-card" onclick="showDetail(${r.constituency_id}, '${r.constituency_name.replace(/'/g, "\\'")}')">
          <div class="constituency-name">${r.constituency_name}</div>
          <div style="font-size:var(--text-xs); color:var(--text-secondary);">Constituency #${r.constituency_id}</div>

          <div class="winner-info">
            <span class="party-dot" style="background:${r.color_code}; width:14px; height:14px;"></span>
            <div style="flex:1;">
              <div style="font-size:var(--text-sm); font-weight:600; color:${r.color_code};">${r.candidate_name}</div>
              <div style="font-size:var(--text-xs); color:var(--text-secondary);">${r.party_name} (${r.party_abbr})</div>
            </div>
            <div style="text-align:right;">
              <div style="font-family:'Noto Serif',serif; font-size:var(--text-lg); font-weight:700; color:var(--green);">${r.vote_count}</div>
              <div style="font-size:var(--text-xs); color:var(--text-secondary);">votes</div>
            </div>
          </div>
        </div>
      `).join('');
        }

        async function showDetail(constId, constName) {
            document.getElementById('modal-const-name').textContent = constName;
            document.getElementById('modal-results').innerHTML = '<div class="spinner" style="margin:20px auto;"></div>';
            document.getElementById('result-modal').classList.remove('hidden');

            const res = await api('GET', `/api/admin/results/${constId}`);
            if (!res || !res.success) return;

            const container = document.getElementById('modal-results');
            if (res.results.length === 0) {
                container.innerHTML = '<p style="color:var(--text-secondary); font-size:var(--text-sm); text-align:center; padding:16px;">No votes recorded for this constituency</p>';
                return;
            }

            const maxVotes = Math.max(...res.results.map(r => r.vote_count));

            container.innerHTML = res.results.map((r, i) => {
                const pctWidth = maxVotes > 0 ? (r.vote_count / maxVotes * 100) : 0;
                const isLeader = i === 0;
                return `
          <div class="glass-card" style="padding:14px; margin-bottom:8px; ${isLeader ? 'border-left:4px solid ' + r.color_code + ';' : ''}">
            <div class="flex items-center gap-3 mb-2">
              <span style="font-family:'Noto Serif',serif; font-size:var(--text-sm); font-weight:700; color:${isLeader ? 'var(--green)' : 'var(--text-light)'}; width:24px;">#${r.position}</span>
              <span class="party-dot" style="background:${r.color_code}; width:12px; height:12px;"></span>
              <div style="flex:1;">
                <div style="font-size:var(--text-sm); font-weight:600; color:var(--text-primary);">${r.candidate_name}</div>
                <div style="font-size:var(--text-xs); color:var(--text-secondary);">${r.party_name} (${r.party_abbr})</div>
              </div>
              <span style="font-family:'Noto Serif',serif; font-size:var(--text-base); font-weight:700; color:${isLeader ? 'var(--green)' : 'var(--text-secondary)'};">${r.vote_count}</span>
            </div>
            <div class="progress-bar" style="height:4px;">
              <div class="progress-fill" style="width:${pctWidth}%; background:${r.color_code};"></div>
            </div>
          </div>
        `;
            }).join('');
        }

        function closeResultModal() {
            document.getElementById('result-modal').classList.add('hidden');
        }

        init();
    </script>
</body>

</html>
