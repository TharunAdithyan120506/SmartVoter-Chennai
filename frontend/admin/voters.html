<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voter List — Administrative Portal</title>
    <meta name="description" content="Voter records management — Chennai District Elections 2026">
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <div class="logo-emblem">
                        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                        </svg>
                    </div>
                    <div class="logo-text">
                        Administrative Portal
                        <span>Election Commission of India</span>
                    </div>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></span>
                    Dashboard
                </a>
                <a href="voters.html" class="nav-item active">
                    <span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg></span>
                    Voter List
                </a>
                <a href="candidates.html" class="nav-item">
                    <span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21h18"/><path d="M5 21V7l8-4v18"/><path d="M19 21V11l-6-4"/></svg></span>
                    Candidates
                </a>
                <a href="polling.html" class="nav-item">
                    <span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg></span>
                    Polling Mode
                </a>
                <a href="results.html" class="nav-item">
                    <span class="icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span>
                    Results
                </a>
            </nav>
            <div class="sidebar-footer">
                <button class="btn-logout" onclick="logout()">Sign Out</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h1 class="page-title">Voter List</h1>
                <p class="page-subtitle">Search, view, and manage voter records</p>
            </div>

            <div class="table-container">
                <div class="table-header">
                    <input type="text" class="table-search" id="search-input"
                        placeholder="Search by name, voter ID, or Aadhaar..." oninput="debounceSearch()">
                    <span style="font-size:var(--text-xs); color:var(--text-secondary);" id="total-label">—</span>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Voter ID</th>
                            <th>Name</th>
                            <th>Age</th>
                            <th>Gender</th>
                            <th>Constituency</th>
                            <th>Voted</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="voters-table"></tbody>
                </table>
                <div class="table-pagination">
                    <span id="page-info">—</span>
                    <div class="pagination-btns">
                        <button id="prev-btn" onclick="changePage(-1)" disabled>&larr; Prev</button>
                        <button id="next-btn" onclick="changePage(1)" disabled>Next &rarr;</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Edit Modal -->
    <div class="modal-overlay hidden" id="edit-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">Edit Voter Record</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="form-group">
                <label for="edit-name">Name</label>
                <input type="text" class="form-input" id="edit-name">
            </div>
            <div class="form-group">
                <label for="edit-phone">Phone</label>
                <input type="text" class="form-input" id="edit-phone" maxlength="10">
            </div>
            <div class="form-group">
                <label for="edit-address">Address</label>
                <textarea class="form-input" id="edit-address" rows="3" style="resize:vertical;"></textarea>
            </div>
            <div class="flex gap-2" style="justify-content:flex-end;">
                <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" id="save-btn" onclick="saveVoter()">Save Changes</button>
            </div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script>
        let currentPage = 1;
        let totalPages = 1;
        let searchTimeout = null;
        let editingVoterId = null;

        async function loadVoters() {
            const search = document.getElementById('search-input').value.trim();
            const res = await api('GET', `/api/admin/voters?page=${currentPage}&limit=20&search=${encodeURIComponent(search)}`);
            if (!res || !res.success) return;

            totalPages = res.pages;
            document.getElementById('total-label').textContent = `${res.total} voters`;
            document.getElementById('page-info').textContent = `Page ${res.page} of ${res.pages}`;
            document.getElementById('prev-btn').disabled = currentPage <= 1;
            document.getElementById('next-btn').disabled = currentPage >= totalPages;

            const tbody = document.getElementById('voters-table');
            tbody.innerHTML = res.voters.map(v => {
                const votedBadge = v.has_voted
                    ? '<span class="badge badge-voted">&#10003; Voted</span>'
                    : '<span class="badge badge-not-voted">Pending</span>';
                return `<tr>
          <td class="mono" style="font-size:var(--text-xs);">${v.voter_id}</td>
          <td style="font-weight:600; color:var(--text-primary);">${v.name}</td>
          <td>${v.age}</td>
          <td>${v.gender}</td>
          <td>${v.constituency_name}</td>
          <td>${votedBadge}</td>
          <td><button class="btn btn-secondary btn-sm" onclick="editVoter('${v.voter_id}', '${v.name.replace(/'/g, "\\'")}', '${v.phone}', '${v.address.replace(/'/g, "\\'")}')">Edit</button></td>
        </tr>`;
            }).join('');
        }

        function debounceSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                currentPage = 1;
                loadVoters();
            }, 400);
        }

        function changePage(delta) {
            currentPage += delta;
            loadVoters();
        }

        function editVoter(voterId, name, phone, address) {
            editingVoterId = voterId;
            document.getElementById('edit-name').value = name;
            document.getElementById('edit-phone').value = phone;
            document.getElementById('edit-address').value = address;
            document.getElementById('edit-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('edit-modal').classList.add('hidden');
            editingVoterId = null;
        }

        async function saveVoter() {
            if (!editingVoterId) return;
            const btn = document.getElementById('save-btn');
            btn.disabled = true;
            btn.textContent = 'Saving...';

            const res = await api('PUT', `/api/admin/voters/${encodeURIComponent(editingVoterId)}`, {
                name: document.getElementById('edit-name').value,
                phone: document.getElementById('edit-phone').value,
                address: document.getElementById('edit-address').value,
            });

            btn.disabled = false;
            btn.textContent = 'Save Changes';

            if (res && res.success) {
                showToast('Voter record updated successfully', 'success');
                closeModal();
                loadVoters();
            } else {
                showToast(res?.error || 'Failed to update voter', 'error');
            }
        }

        async function init() {
            const data = await requireAdminAuth();
            if (!data) return;
            loadVoters();
        }
        init();
    </script>
</body>

</html>
